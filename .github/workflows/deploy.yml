name: Build and publish Docker image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'README*'
      - 'docs/**'
      - 'screenshots/**'
      - 'deploy/**'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - 'config.example.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image names
        id: img
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          dockerhub_user="$(printf '%s' "$DOCKERHUB_USERNAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -z "$dockerhub_user" ]; then
            echo "::error::Set DOCKERHUB_USERNAME as a repository variable or secret."
            exit 1
          fi
          if ! [[ "$dockerhub_user" =~ ^[a-z0-9][a-z0-9_-]*$ ]]; then
            echo "::error::Docker Hub username/namespace '$dockerhub_user' is not a valid Docker image namespace."
            exit 1
          fi
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${dockerhub_user}/omnisight" >> "$GITHUB_OUTPUT"
          echo "dockerhub_user=${dockerhub_user}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.img.outputs.dockerhub_user }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.img.outputs.ghcr }}
            ${{ steps.img.outputs.dockerhub }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
