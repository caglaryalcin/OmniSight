# OmniSight — example Kubernetes deployment
# Replace OWNER with your GitHub owner (lowercase); image is published by the
# GitHub Actions workflow to ghcr.io/OWNER/omnisight.
#
#   kubectl apply -f deploy/kubernetes.yaml
#
# ── Custom CA certificate (optional) ──
# 1) Create the ConfigMap with your CA, 2) uncomment the env, volumeMount and volume above.
# Alternatively (no ConfigMap): drop the *.crt into the data PVC under /app/data/certs/ — auto-trusted.
# ---
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: omnisight-ca
#   namespace: default
# data:
#   ca.crt: |
#     -----BEGIN CERTIFICATE-----
#     ...your CA cert here...
#     -----END CERTIFICATE-----
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: omnisight-data
spec:
  capacity:
    storage: 64Mi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /yourhostpath
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omnisight-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: omnisight-data
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnisight
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnisight
  template:
    metadata:
      labels:
        app: omnisight
    spec:
      containers:
        - name: omnisight
          image: ghcr.io/caglaryalcin/omnisight:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: OMNISIGHT_SECRET
              valueFrom:
                secretKeyRef:
                  name: omnisight-secret
                  key: OMNISIGHT_SECRET
                  optional: true
            # Custom CA: uncomment to trust the cert mounted from the ConfigMap below.
            # - name: NODE_EXTRA_CA_CERTS
            #   value: "/app/certs/ca.crt"
          volumeMounts:
            - name: data
              mountPath: /app/data
            # - name: ca-certs
            #   mountPath: /app/certs
            #   readOnly: true
          livenessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omnisight-data
        # - name: ca-certs
        #   configMap:
        #     name: omnisight-ca
---
apiVersion: v1
kind: Service
metadata:
  name: omnisight
  namespace: default
spec:
  type: NodePort
  selector:
    app: omnisight
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30133