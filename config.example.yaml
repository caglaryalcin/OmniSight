# OmniSight configuration
# Any value may reference an environment variable: ${VAR} or ${VAR:-default}
# Example:  tokenSecret: ${PVE_TOKEN_SECRET}   |   chatId: "${TG_CHAT_ID}"
# Useful for Docker / secrets — set the env var and reference it here.
# Keep key files (kubeconfig, SSH keys) in the ./data/ folder (git-ignored).

# Optional timezone for server-side timestamps/notifications.
# Can also be set with TZ=Europe/Istanbul (or TIMEZONE=Europe/Istanbul).
timezone: "${TZ:-UTC}"
timeFormat: "24h"
defaultTimePeriodHours: 1
historyRetentionDays: 7
preferredLanguage: "en"
appearance:
  dashboardSidePanel: true
performance:
  lowIoMode: false
  collectorConcurrency: 3
  # Optional per-platform refresh intervals in seconds. Backoff is automatic after failures.
  # refreshIntervals:
  #   snmp: 30
  #   docker: 15
security:
  selfRegistrationEnabled: true
  redactIpAddresses: false
  allowedPublicIps: []

# Linux servers, Windows hosts, Proxmox nodes and Docker hosts are all monitored by the
# OmniSight agent (push). Use Settings -> "+ Add System / Windows Host / Node / Host" to get
# a copy-paste install command (Binary/systemd, PowerShell or Docker) with the token
# pre-filled. Agents self-register; no per-server config is needed here.
#   Binary:  curl -fsSL http://<host>:3000/agent/install.sh | \
#              sudo OMNISIGHT_URL=http://<host>:3000 OMNISIGHT_TOKEN=<token> bash
#   Windows: $env:OMNISIGHT_URL="http://<host>:3000"; $env:OMNISIGHT_TOKEN="<token>";
#              iwr -UseBasicParsing "http://<host>:3000/agent/install-windows.ps1" | iex
#   Self-signed HTTPS: add curl --insecure and OMNISIGHT_INSECURE_TLS=1.
# The same shared token is used by every agent (linux.agentToken).
linux:
  enabled: true
  agentToken: "generate-from-settings-ui"

windows:
  enabled: true

# Proxmox data (VM/LXC, storage, backups, Ceph) is collected by the agent via
# pvesh on each node - no API token needed. Just install the agent on the node.
proxmox:
  enabled: true

kubernetes:
  kubeconfig: './data/kube.bin'   # put your kubeconfig in data/
  namespaces:
    - default
    - production

snmp:
  devices:
    - name: "NAS-01"
      host: "192.168.1.5"
      profile: "synology" # generic, synology, mikrotik, unifi
      community: "CHANGE_ME"

healthchecks:
  url: "https://healthchecks.yourdomain.com"
  apiKey: "your-api-key-here"
  pingBaseUrl: "https://healthchecks.yourdomain.com/ping"
  pingKey: "" # optional, needed to build ping URLs when using a read-only API key

uptimekuma:
  url: "https://kuma.yourdomain.com"
  slug: "default"
  username: ""
  password: ""
  historyHours: 1

# Optional built-in checks, independent from external status tools.
checks:
  enabled: true
  services:
    - name: "Homepage"
      type: "http"      # http, tcp, ping, dns
      target: "https://example.com"
      timeoutMs: 5000
    - name: "SSH"
      type: "tcp"
      target: "10.0.0.10"
      port: 22

# Docker containers are reported by the same agent when docker is present on
# the host (or run the agent itself as a container - see Settings -> Docker).
docker:
  enabled: true
  # Optional SSH host example:
  # hosts:
  #   - type: ssh
  #     name: docker01
  #     sshHost: 10.0.0.20
  #     sshUser: root

dockhand:
  enabled: false
  # instances:
  #   - name: Dockhand
  #     url: "https://dockhand.example.com"
  #     token: "dh_..."
  #     insecureTLS: false

firewall:
  enabled: false
  # OPNsense uses API key/secret. pfSense requires a compatible REST API endpoint.
  # instances:
  #   - name: Gateway
  #     type: opnsense
  #     url: "https://opnsense.example.com"
  #     apiKey: "${OPNSENSE_API_KEY:-}"
  #     apiSecret: "${OPNSENSE_API_SECRET:-}"
  #     insecureTLS: false

unifi:
  enabled: false
  # UniFi Network controller via the official Integration API (Network app 9.3+).
  # API key: UniFi OS console -> Settings -> Control Plane -> Integrations.
  # The optional legacy block enables WAN latency/packet loss via the classic
  # API — use a dedicated LOCAL, read-only, MFA-exempt account.
  # UniFi devices can additionally be monitored over SNMP (snmp: section,
  # profile: unifi); both render in the same UniFi dashboard card.
  # instances:
  #   - name: Controller
  #     url: "https://192.168.1.1"       # UniFi OS console or self-hosted Network app
  #     apiKey: "${UNIFI_API_KEY:-}"
  #     site: default                    # optional; auto-discovered when omitted
  #     insecureTLS: true                # self-signed controller certs are the norm
  #     legacy:
  #       username: "omnisight-ro"
  #       password: "${UNIFI_LEGACY_PASSWORD:-}"

linstor:
  enabled: false
  # LINSTOR / DRBD replication health via the controller REST API. Controller-
  # only: no agents on the storage nodes. Read-only. Default port 3370 (plain);
  # with a bearer token or client cert the collector auto-selects https://…:3371.
  #
  # Auth: the REST API ships UNAUTHENTICATED — protect port 3370 with a firewall
  # allowlist (OmniSight host + admins). It can also be secured natively:
  #   - bearerToken: LINSTOR 1.34+ (`linstor controller auth init`)
  #   - tls.cert + tls.privateKey: mutual TLS (client certificate)
  # bearerToken, tls.privateKey and tls.password are encrypted at rest.
  #
  # A node is treated as "in maintenance" (expected offline, never pages, gray
  # pill) when its LINSTOR property Aux/maintenance == "true":
  #   linstor node set-property <node> Aux/maintenance true
  #
  # instances:
  #   - name: linstor
  #     url: "http://linstor.yourdomain.com:3370"
  #     # bearerToken: "${LINSTOR_TOKEN:-}"   # LINSTOR 1.34+; auto-switches to https:3371
  #     poolWarn: 85                          # thin-pool used% (or metadata%) warn
  #     poolPage: 92                          # thin-pool used% (or metadata%) page
  #     # tls:                                # optional mutual TLS
  #     #   cert: |
  #     #     -----BEGIN CERTIFICATE-----
  #     #   privateKey: "${LINSTOR_CLIENT_KEY:-}"
  #     #   caCert: |
  #     #     -----BEGIN CERTIFICATE-----
  #     #   skipVerify: false                 # true for the self-signed auth-init cert

truenas:
  enabled: false
  # TrueNAS 25.04+ uses WebSocket JSON-RPC; older CORE/SCALE REST v2.0 can be used
  # by setting apiMode: rest, or leave apiMode: auto to try both safely.
  # instances:
  #   - name: Storage
  #     url: "https://truenas.example.com"
  #     apiMode: auto # auto, websocket, rest
  #     username: "root"
  #     apiKey: "${TRUENAS_API_KEY:-}"
  #     insecureTLS: false

qnap:
  enabled: false
  # QNAP QTS HTTP API authLogin.cgi + File Station SID check.
  # instances:
  #   - name: QNAP
  #     url: "https://qnap.example.com:8080"
  #     username: "monitoring"
  #     password: "${QNAP_PASSWORD:-}"
  #     # sid: "${QNAP_SID:-}" # optional existing SID instead of username/password
  #     insecureTLS: false

ugreen:
  enabled: false
  # UGREEN UGOS Pro does not publish a stable public monitoring API; OmniSight
  # checks the configured web endpoint reachability.
  # instances:
  #   - name: Ugreen
  #     url: "https://ugreen.example.com"
  #     insecureTLS: false

pbs:
  enabled: false
  # Proxmox Backup Server management API. Default PBS HTTPS port is 8007.
  # instances:
  #   - name: PBS
  #     url: "https://pbs.example.com:8007"
  #     tokenId: "root@pam!monitoring"
  #     tokenSecret: "${PBS_TOKEN_SECRET:-}"
  #     insecureTLS: false

cloudflare:
  enabled: false
  # API token scoped to Zone Read. Add accountId to monitor Cloudflare Tunnels
  # and Cloudflare Registrar domain expiration.
  apiToken: "${CLOUDFLARE_API_TOKEN:-}"
  accountId: ""
  includeTunnels: true
  includeRegistrarDomains: true
  domainExpiryWarningDays: 30
  # Optional zone names or IDs to limit collection.
  # zones:
  #   - example.com

cicd:
  enabled: false
  # GitHub Actions and GitLab CI read-only monitoring.
  # projects:
  #   - name: OmniSight GitHub
  #     provider: github
  #     repo: "owner/repo"
  #     branch: main
  #     token: "${GITHUB_TOKEN:-}"
  #   - name: OmniSight GitLab
  #     provider: gitlab
  #     baseUrl: "https://gitlab.com"
  #     projectId: "group/project"
  #     branch: main
  #     token: "${GITLAB_TOKEN:-}"
  #     includeJobs: true

veeam:
  enabled: false
  # Veeam Backup & Replication REST API. Default VBR REST HTTPS port is 9419.
  # instances:
  #   - name: VBR
  #     url: "https://veeam.example.com:9419"
  #     username: "DOMAIN\\monitoring"
  #     password: "${VEEAM_PASSWORD:-}"
  #     apiVersion: "1.3-rev1"
  #     insecureTLS: false

portainer:
  enabled: false
  # Create an access token in Portainer: My account -> Access tokens.
  # instances:
  #   - name: Portainer
  #     url: "https://portainer.example.com:9443"
  #     apiKey: "${PORTAINER_API_KEY:-}"
  #     insecureTLS: false

publicStatus: false
publicTitle: "OmniSight Status"
publicDescription: ""
publicStatusShowDetails: false
publicStatusShowHistory: false
publicPlatforms:
  - proxmox
  - linux
  - kubernetes
  - snmp
  - healthchecks
  - uptimekuma
  - checks
  - prometheus
  - docker
  - dockhand
  - firewall
  - truenas
  - qnap
  - ugreen
  - pbs
  - cloudflare
  - cicd
  - veeam
  - portainer
  - database

alerts:
  enabled: true
  thresholds:
    cpu:
      warning: 80
      critical: 90
    ram:
      warning: 80
      critical: 90
    disk:
      warning: 80
      critical: 90
  rules:
    # Default debounce for alerts without a more specific rule.
    # Set to 0 for immediate notifications.
    default:
      durationSeconds: 60
    cpu:
      durationSeconds: 60
    ram:
      durationSeconds: 60
    disk:
      durationSeconds: 60
    pod:
      durationSeconds: 60
    container:
      durationSeconds: 60
    target:
      durationSeconds: 60
    snmp:
      durationSeconds: 120
  maintenanceWindows:
    # days: mon,tue,wed,thu,fri  |  wrap-around windows such as 23:00 -> 02:00 are supported
    - start: "23:00"
      end: "23:30"
      days: ["sun"]
  webhook:
    enabled: false
    token: "change-me-long-random-token"
  ntfy:
    url: "https://ntfy.sh"
    topic: "omnisight-CHANGE-ME"
    priority: "default"
  telegram:
    botToken: "123456:ABC-your-bot-token"
    chatId: "123456789"
  mattermost:
    # Incoming webhook URL (Mattermost; payload is also Slack/Rocket.Chat compatible)
    webhookUrl: "https://mattermost.example.com/hooks/xxx-generated-key-xxx"
    # channel: "town-square"           # optional override (if the webhook allows it)
    # username: "OmniSight"            # optional bot display name
    # iconUrl: "https://example.com/icon.png"  # optional avatar
    # insecureTLS: false               # true = skip TLS verification (self-signed)
  smtp:
    host: "smtp.gmail.com"
    port: 587
    secure: false
    user: "you@gmail.com"
    password: "app-password"
    from: "OmniSight <you@gmail.com>"
    to:
      - "alerts@yourdomain.com"

# Optional: expose a read-only public status page at /status
# publicStatus: true
# publicTitle: "OmniSight Status"
