<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight — Login</title>
<link rel="icon" type="image/svg+xml" href="/assets/omnisight-logo.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#141617;--panel:#181A1B;--border:#242C3B;
  --text:#E2E8F2;--muted:#7D8AA3;--green:#34D399;--red:#F87171;
}
body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:
  radial-gradient(800px 500px at 70% -10%, rgba(99,102,241,.16), transparent 60%),
  radial-gradient(700px 500px at 10% 110%, rgba(34,211,238,.09), transparent 60%)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:38px 34px;width:100%;max-width:380px;
  box-shadow:0 1px 2px rgba(0,0,0,.25),0 24px 60px -24px rgba(0,0,0,.6);animation:in .3s ease}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;transform:translateX(-12px)}
.logo-mark{width:28px;height:28px;display:block;object-fit:contain}
.logo-text{font-size:19px;font-weight:800;letter-spacing:-.02em}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
input{
  width:100%;background:#1A202C;border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:14px;padding:10px 12px;outline:none;margin-bottom:16px;
  transition:border-color .15s;
}
input:focus{border-color:#4a5568}
.btn{
  width:100%;background:var(--green);border:none;border-radius:7px;
  color:#fff;font-size:14px;font-weight:600;padding:11px;cursor:pointer;
  transition:opacity .15s;
}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:default}
.err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.remember{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;user-select:none}
.remember input{width:auto;margin:0;cursor:pointer}
.remember span{font-size:13px;color:var(--muted)}
.otp-note{font-size:12px;color:var(--muted);margin:-8px 0 14px;line-height:1.45}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img class="logo-mark" src="/assets/omnisight-logo.svg" alt=""><span class="logo-text" id="title">OmniSight</span></div>
  <label for="u">Username</label>
  <input id="u" type="text" autocomplete="username" autofocus>
  <label for="p">Password</label>
  <input id="p" type="password" autocomplete="current-password">
  <div id="totp-wrap" style="display:none">
    <label for="code">Two-factor code</label>
    <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456">
    <div class="otp-note">Enter the 6-digit code from your authenticator app.</div>
  </div>
  <div id="confirm-wrap" style="display:none">
    <label for="p2">Confirm password</label>
    <input id="p2" type="password" autocomplete="new-password">
  </div>
  <label class="remember" id="rem-wrap"><input type="checkbox" id="rem"><span>Remember me for 30 days</span></label>
  <button class="btn" id="btn" onclick="submitForm()">Sign in</button>
  <div class="err" id="err"></div>
</div>
<script>
let mode = 'login';
let twoFactorVisible = false;
function showTwoFactor(){
  twoFactorVisible = true;
  document.getElementById('totp-wrap').style.display = '';
}
function setMode(m){
  mode = m;
  const reg = m === 'register';
  document.getElementById('confirm-wrap').style.display = reg ? '' : 'none';
  document.getElementById('totp-wrap').style.display = (!reg && twoFactorVisible) ? '' : 'none';
  document.getElementById('rem-wrap').style.display = reg ? 'none' : 'flex';
  document.getElementById('btn').textContent = reg ? 'Register' : 'Sign in';
  document.getElementById('title').textContent = reg ? 'Create account' : 'OmniSight';
}
async function submitForm(){
  const btn = document.getElementById('btn'), err = document.getElementById('err');
  const username = document.getElementById('u').value.trim();
  const password = document.getElementById('p').value;
  if(!username || !password){ err.textContent = 'Enter username and password'; return; }
  btn.disabled = true; err.textContent = '';
  try {
    if(mode === 'register'){
      if(password !== document.getElementById('p2').value){ err.textContent = 'Passwords do not match'; btn.disabled = false; return; }
      const rr = await fetch('/api/set-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const dd = await rr.json();
      if(!rr.ok || !dd.ok){ err.textContent = dd.error || 'Registration failed'; btn.disabled = false; return; }
    }
    const remember = document.getElementById('rem').checked;
    const code = document.getElementById('code').value.trim();
    const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,remember,code})});
    const d = await r.json();
    if(d.twoFactorRequired){
      showTwoFactor();
      document.getElementById('code').focus();
      err.textContent = d.error || 'Two-factor code required';
      return;
    }
    if(!r.ok || !d.ok){ err.textContent = d.error || 'Login failed'; return; }
    sessionStorage.removeItem('os_token');
    localStorage.removeItem('os_token');
    window.location.href = '/';
  } catch { err.textContent = 'Network error'; } finally { btn.disabled = false; }
}

document.getElementById('u').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('p').focus(); });
document.getElementById('p').addEventListener('keydown', e => {
  if(e.key==='Enter'){
    if(twoFactorVisible) document.getElementById('code').focus();
    else submitForm();
  }
});
document.getElementById('code').addEventListener('keydown', e => { if(e.key==='Enter') submitForm(); });

(async () => {
  try {
    const r = await fetch('/api/auth-status');
    const d = await r.json();
    if(r.ok && !d.required) setMode('register');
    else if(d.twoFactorEnabled) showTwoFactor();
  } catch {}
})();
</script>
</body>
</html>
