<!DOCTYPE html>
<html lang="en">
<head>
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("os_theme")||"dark")}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight - Topology</title>
<link rel="icon" type="image/svg+xml" href="/assets/omnisight-logo.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141617;--panel:#181A1B;--row:#141617;--border:#242C3B;--border2:#334056;--text:#E2E8F2;--muted:#8CA0BE;--green:#34D399;--red:#F87171;--yellow:#FBBF24;--blue:#60A5FA;--cyan:#22D3EE;--purple:#A78BFA;--shadow:0 16px 50px rgba(0,0,0,.28)}
html[data-theme="light"]{--bg:#f3f5f9;--panel:#ffffff;--row:#eef1f6;--border:#dce3ee;--border2:#c8d2e0;--text:#162032;--muted:#64748b;--green:#0e9f6e;--red:#dc2f2f;--yellow:#b7791f;--blue:#2563eb;--cyan:#0891b2;--purple:#7c3aed;--shadow:0 16px 44px rgba(15,23,42,.12)}
body{height:100vh;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(900px 500px at 84% -12%,rgba(96,165,250,.10),transparent 62%),radial-gradient(780px 460px at 4% 102%,rgba(52,211,153,.075),transparent 62%)}
header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none;font-size:19px;font-weight:850}
.logo img{width:24px;height:24px;display:block}
.toolbar{display:flex;align-items:center;gap:8px}
.btn{height:36px;background:var(--row);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0 12px;font-size:12px;font-weight:800;cursor:pointer}
.btn:hover{border-color:var(--border2)}
.btn.on{color:var(--green);border-color:rgba(52,211,153,.45)}
.wrap{flex:1;min-height:0;display:flex;flex-direction:column;gap:12px;padding:16px;overflow:hidden}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;flex:0 0 auto}
.sum{background:var(--panel);border:1px solid var(--border);border-radius:10px;min-height:58px;display:grid;place-items:center;box-shadow:var(--shadow)}
.sum>div{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.sum-v{width:100%;font-size:22px;font-weight:900;line-height:1;color:var(--green);text-align:center}
.sum-l{width:100%;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:5px;font-weight:800;text-align:center}
.sum-v-empty{height:22px;color:transparent}
.map-shell{position:relative;flex:1;min-height:0;background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:grab;touch-action:none}
.map-shell.dragging{cursor:grabbing}
.map{position:relative;width:100%;height:100%;isolation:isolate}
.map-inner{position:absolute;left:0;top:0;transform-origin:top left}
.edge-layer{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:visible}
.edge{fill:none;stroke:rgba(96,165,250,.38);stroke-width:1.7;stroke-linecap:round}
.edge.good{stroke:rgba(52,211,153,.46)}.edge.warn{stroke:rgba(251,191,36,.48)}.edge.bad{stroke:rgba(248,113,113,.50)}.edge.idle{stroke:rgba(140,160,190,.34)}.edge.manual{stroke:rgba(167,139,250,.62);stroke-width:2.1}
.edge.layer-switch{stroke:rgba(34,211,238,.58);stroke-width:2.05}
.edge.layer-nas{stroke:rgba(251,191,36,.64);stroke-width:2.05}
.edge.layer-platform{stroke:rgba(167,139,250,.66);stroke-width:2.1}
.edge.layer-proxmox{stroke:rgba(249,115,22,.66);stroke-width:2.1}
.edge.layer-vm{stroke:rgba(52,211,153,.58);stroke-width:2.05}
.flow-dots{pointer-events:none}
.flow-dot{opacity:.88}
.topo-node{position:absolute;z-index:2;width:148px;min-height:62px;transform:translate(-50%,-50%);display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.008)),var(--row);box-shadow:0 12px 28px rgba(0,0,0,.18)}
.topo-node{cursor:grab;touch-action:none}
.topo-node.node-dragging{cursor:grabbing;z-index:7}
.topo-node.link-target{border-color:rgba(167,139,250,.78);box-shadow:0 0 0 1px rgba(167,139,250,.28),0 16px 36px rgba(0,0,0,.22)}
.topo-node.root{width:176px;min-height:70px;border-color:rgba(34,211,238,.38);background:linear-gradient(180deg,rgba(34,211,238,.09),rgba(52,211,153,.045)),var(--row)}
.topo-node.platform{border-color:rgba(96,165,250,.28)}
.topo-node.leaf{width:132px;min-height:52px;padding:7px 9px}
.node-icon{width:31px;height:31px;border-radius:9px;border:1px solid var(--border2);background:rgba(96,165,250,.09);display:grid;place-items:center;flex:0 0 auto;color:var(--blue);font-size:15px;font-weight:900}
.node-icon img{width:100%;height:100%;object-fit:contain;display:block}
.topo-node.root .node-icon{background:rgba(34,211,238,.10);color:var(--cyan)}
.topo-node.good .node-icon{color:var(--green);background:rgba(52,211,153,.09)}
.topo-node.warn .node-icon{color:var(--yellow);background:rgba(251,191,36,.10)}
.topo-node.bad .node-icon{color:var(--red);background:rgba(248,113,113,.10)}
.topo-node.idle .node-icon{color:var(--muted);background:rgba(140,160,190,.08)}
.topo-node .node-icon.icon-mikrotik{background:#eef1f6;border-color:rgba(226,232,242,.42);color:#111827;padding:3px}
.topo-node .node-icon.icon-mikrotik img{filter:none}
.node-main{min-width:0;flex:1}
.node-name{font-size:12.5px;line-height:1.18;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topo-node.root .node-name{font-size:15px}
.node-meta{font-size:10.5px;color:var(--muted);line-height:1.25;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-dot{width:8px;height:8px;border-radius:50%;position:absolute;left:10px;top:10px;background:var(--muted)}
.topo-node.good .node-dot{background:var(--green);box-shadow:0 0 10px rgba(52,211,153,.45)}.topo-node.warn .node-dot{background:var(--yellow)}.topo-node.bad .node-dot{background:var(--red)}
.node-port{position:absolute;width:13px;height:13px;border-radius:50%;border:2px solid var(--panel);background:var(--purple);box-shadow:0 0 0 1px rgba(167,139,250,.42),0 0 12px rgba(167,139,250,.28);cursor:crosshair;z-index:8;opacity:0;pointer-events:none;transition:opacity .14s ease,box-shadow .14s ease}
.node-port.left{left:-7px;top:50%;transform:translateY(-50%)}.node-port.right{right:-7px;top:50%;transform:translateY(-50%)}
.node-port.top{left:50%;top:-7px;transform:translateX(-50%)}.node-port.bottom{left:50%;bottom:-7px;transform:translateX(-50%)}
.topo-node:hover .node-port{opacity:1;pointer-events:auto}
.map-shell.linking .node-port,.map-shell.node-moving .node-port,.topo-node.node-dragging .node-port{opacity:0;pointer-events:none}
.node-port:hover{box-shadow:0 0 0 2px rgba(167,139,250,.48),0 0 16px rgba(167,139,250,.44)}
.node-delete{position:absolute;right:-10px;top:-10px;z-index:9;width:24px;height:24px;display:grid;place-items:center;border:1px solid rgba(248,113,113,.42);border-radius:8px;background:rgba(20,22,23,.90);color:var(--red);box-shadow:0 10px 26px rgba(0,0,0,.28);cursor:pointer;opacity:0;pointer-events:none;transition:opacity .14s ease,border-color .14s ease,background .14s ease}
.topo-node:hover .node-delete{opacity:1;pointer-events:auto}
.map-shell.linking .node-delete,.map-shell.node-moving .node-delete,.topo-node.node-dragging .node-delete{opacity:0;pointer-events:none}
.node-delete:hover{background:rgba(248,113,113,.16);border-color:rgba(248,113,113,.70)}
.node-delete svg{width:13px;height:13px;display:block}
html[data-theme="light"] .node-delete{background:rgba(255,255,255,.92)}
.edge.temp{stroke:var(--purple);stroke-width:2.2;stroke-dasharray:7 9;filter:drop-shadow(0 0 4px rgba(167,139,250,.38))}
.edge-hit{fill:none;stroke:transparent;stroke-width:28;stroke-linecap:round;pointer-events:stroke;cursor:pointer}
.edge-delete{position:absolute;z-index:6;width:34px;height:30px;display:none;place-items:center;transform:translate(-50%,-50%);border:1px solid rgba(248,113,113,.42);border-radius:8px;background:rgba(20,22,23,.88);color:var(--red);box-shadow:0 10px 28px rgba(0,0,0,.32);backdrop-filter:blur(10px);cursor:pointer}
.edge-delete.show{display:grid}.edge-delete:hover{background:rgba(248,113,113,.16);border-color:rgba(248,113,113,.70)}
.edge-delete svg{width:15px;height:15px;display:block}
html[data-theme="light"] .edge-delete{background:rgba(255,255,255,.92)}
.legend{position:absolute;right:14px;bottom:14px;z-index:4;display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(20,22,23,.74);backdrop-filter:blur(10px);font-size:11px;color:var(--muted);font-weight:800}
html[data-theme="light"] .legend{background:rgba(255,255,255,.78)}
.legend span{display:flex;align-items:center;gap:5px}.legend i{width:8px;height:8px;border-radius:50%;display:block}
.map-hint{position:absolute;left:14px;bottom:14px;z-index:4;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(20,22,23,.74);backdrop-filter:blur(10px);font-size:11px;color:var(--muted);font-weight:800;pointer-events:none}
html[data-theme="light"] .map-hint{background:rgba(255,255,255,.78)}
.map-link-toggle{position:absolute;left:14px;top:14px;z-index:4;height:34px;background:rgba(20,22,23,.76);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0 12px;font-size:12px;font-weight:850;cursor:pointer;backdrop-filter:blur(10px)}
.map-link-toggle:hover,.map-link-toggle.on{border-color:rgba(52,211,153,.48);color:var(--green)}
html[data-theme="light"] .map-link-toggle{background:rgba(255,255,255,.80)}
.link-panel{display:none;position:absolute;left:14px;top:58px;z-index:5;width:min(420px,calc(100% - 28px));background:rgba(20,22,23,.88);border:1px solid var(--border);border-radius:12px;box-shadow:0 18px 55px rgba(0,0,0,.34);backdrop-filter:blur(12px);padding:12px;cursor:default}
.link-panel.open{display:block}
html[data-theme="light"] .link-panel{background:rgba(255,255,255,.92)}
.link-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.link-head strong{font-size:13px}
.link-head-actions{display:flex;align-items:center;gap:8px}
.link-close{border:0;background:transparent;color:var(--muted);font-size:18px;line-height:1;cursor:pointer}
.link-clear{height:28px;border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.08);color:var(--red);border-radius:7px;padding:0 9px;font-size:11px;font-weight:850;cursor:pointer}
.link-clear:hover{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.55)}
.link-help{font-size:11px;line-height:1.45;color:var(--muted);margin:-2px 0 10px}
.link-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
.node-grid{grid-template-columns:1fr auto;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.link-panel label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:800}
.link-panel select{width:100%;height:34px;background:var(--row);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:0 8px;font-size:12px;outline:none}
.link-add{height:34px;background:var(--green);border:0;border-radius:7px;color:#06120d;font-size:12px;font-weight:850;padding:0 12px;cursor:pointer}
.link-add:disabled{opacity:.45;cursor:not-allowed}
.layout-control{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:grid;gap:7px}
.layout-control label{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:800}
.layout-control output{color:var(--text);font-size:11px;letter-spacing:0}
.layout-control input[type=range]{width:100%;accent-color:var(--green)}
.link-list{display:grid;gap:7px;max-height:170px;overflow:auto;margin-top:10px}
.link-row{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--row);border-radius:8px;padding:8px 9px;font-size:12px}
.link-row span{min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-row button{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:7px;height:26px;padding:0 8px;font-size:11px;font-weight:850;cursor:pointer;line-height:1}
.link-row button:hover{color:var(--red);border-color:rgba(248,113,113,.45);background:rgba(248,113,113,.08)}
.link-kind{flex:0 0 auto;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.empty{padding:58px 16px;color:var(--muted);text-align:center}
html.embed header{display:none}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border:2px solid transparent;border-radius:999px;background-clip:content-box}
@media (max-width:900px){.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.wrap{padding:12px}.topo-node{width:148px}.topo-node.root{width:174px}}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
</head>
<body>
<header>
  <a class="logo" href="/"><img src="/assets/omnisight-logo.svg" alt="">OmniSight</a>
  <div class="toolbar">
    <button class="btn" id="links-btn" onclick="toggleLinkPanel()">Add platform/node</button>
    <button class="btn on" id="traffic-btn" onclick="toggleTraffic()">Traffic</button>
    <button class="btn on" id="empty-btn" onclick="toggleEmpty()">Hide empty</button>
    <button class="btn" onclick="load()">Refresh</button>
  </div>
</header>
<div class="wrap">
  <div class="summary" id="summary">
    <div class="sum"><div><div class="sum-v sum-v-empty">&nbsp;</div><div class="sum-l">Platforms</div></div></div>
    <div class="sum"><div><div class="sum-v sum-v-empty">&nbsp;</div><div class="sum-l">Hosts</div></div></div>
    <div class="sum"><div><div class="sum-v sum-v-empty">&nbsp;</div><div class="sum-l">Workloads</div></div></div>
    <div class="sum"><div><div class="sum-v sum-v-empty">&nbsp;</div><div class="sum-l">Links</div></div></div>
  </div>
  <div class="map-shell">
    <div class="map" id="map"><div class="empty">Loading topology...</div></div>
    <button class="map-link-toggle" id="links-map-btn" type="button">Add platform/node</button>
    <div class="link-panel" id="link-panel">
      <div class="link-head">
        <strong>Add platform/node</strong>
        <button class="link-close" type="button" onclick="toggleLinkPanel(false)">&times;</button>
      </div>
      <div class="link-help">Add a platform or host that is not already visible. Remove it later with the trash icon on the node.</div>
      <div class="link-grid node-grid">
        <div><label>Platform or node</label><select id="node-add"></select></div>
        <button class="link-add" id="node-add-btn" type="button" onclick="addTopologyNode()">Add</button>
      </div>
      <div class="layout-control">
        <label for="px-vm-gap">Proxmox host / VM gap <output id="px-vm-gap-out">150px</output></label>
        <input id="px-vm-gap" type="range" min="110" max="260" step="10" value="150" oninput="setProxmoxVmGap(this.value)">
      </div>
      <div class="link-list" id="link-list"></div>
    </div>
    <div class="map-hint">Drag nodes to move · Drag handles to connect · Ctrl + scroll to zoom</div>
    <div class="legend"><span><i style="background:var(--green)"></i>Healthy</span><span><i style="background:var(--yellow)"></i>Degraded</span><span><i style="background:var(--red)"></i>Down</span></div>
  </div>
</div>
<script src="/i18n.js"></script>
<script>
let hideEmpty = true;
let trafficEnabled = true;
let lastData = null;
const TOPOLOGY_CACHE_KEY = 'os_topology_cache_v2';
const TOPOLOGY_VIEW_KEY = 'omnisight_topology_view';
const savedTopologyView = loadTopologyView();
const topoView = {
  scale: savedTopologyView?.scale || 1,
  minScale: .25,
  maxScale: 2.8,
  x: savedTopologyView?.x || 0,
  y: savedTopologyView?.y || 0,
  initialized: !!savedTopologyView,
  userMoved: !!savedTopologyView
};
let currentNodes = [];
let topologyLinks = [];
let topologyNodes = [];
let topologyHidden = [];
let topologySpacing = { proxmoxVmGap: 150 };
let topologyCandidates = [];
const TOPOLOGY_POS_KEY = 'omnisight_topology_positions';
let topologyPositions = loadTopologyPositions();
let topologyPersistTimer = null;
let topologySavingUntil = 0;
let embedPaused = false;
let topologyPollTimer = null;
let topologyLoading = false;
let topologyAbort = null;
let topologyLastLoadedAt = 0;
let topologyRenderSignature = '';
function abortTopologyFetch(){
  try { topologyAbort?.abort(); } catch {}
  topologyAbort = null;
  topologyLoading = false;
}
window.addEventListener('message', event => {
  if(event.origin !== window.location.origin) return;
  if(event.data?.type !== 'omnisight-embed-visibility') return;
  embedPaused = event.data.visible === false;
  if(embedPaused) {
    clearTimeout(topologyPollTimer);
    abortTopologyFetch();
    return;
  }
  if(!embedPaused) scheduleTopologyPoll(50);
});
function scheduleTopologyPoll(delay=15000){
  clearTimeout(topologyPollTimer);
  topologyPollTimer = setTimeout(async () => {
    if(!embedPaused) await load();
    scheduleTopologyPoll(embedPaused ? 5000 : 15000);
  }, delay);
}
document.addEventListener('visibilitychange', () => {
  if(document.hidden) {
    return;
  }
});
const ICONS = {
  proxmox:'PX', kubernetes:'K8', docker:'D', dockhand:'DH', snmp:'SN', synology:'SY', mikrotik:'MT', unifi:'UI', router:'RT', switch:'SW', nas:'NAS', linux:'LX', node:'N', host:'H', guest:'G'
};
const ICON_URLS = {
  proxmox:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/proxmox.svg',
  kubernetes:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kubernetes.svg',
  dockhand:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/dockhand.png',
  synology:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/synology.svg',
  mikrotik:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/mikrotik.svg',
  unifi:'https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/unifi.svg'
};
function authHeaders(){const t=sessionStorage.getItem('os_token')||localStorage.getItem('os_token');return t?{'x-session-token':t}:{}}
function handleUnauth(r){if(r.status===401){sessionStorage.removeItem('os_token');localStorage.removeItem('os_token');document.cookie='session=; path=/; max-age=0';(window.top||window).location.href='/login';throw new Error('Unauthorized')}}
function topologyCacheKey(){
  const token = sessionStorage.getItem('os_token') || localStorage.getItem('os_token') || 'anon';
  return `${TOPOLOGY_CACHE_KEY}:${String(token).slice(-18)}`;
}
function readTopologyCache(maxAgeMs = 10 * 60 * 1000){
  try{
    const key = topologyCacheKey();
    const raw = sessionStorage.getItem(key) || localStorage.getItem(key);
    if(!raw) return null;
    const box = JSON.parse(raw);
    if(!box || Date.now() - Number(box.t || 0) > maxAgeMs) return null;
    return box.data || null;
  }catch{ return null; }
}
function writeTopologyCache(data){
  try{
    if(!data) return;
    const key = topologyCacheKey();
    const raw = JSON.stringify({ t: Date.now(), data });
    sessionStorage.setItem(key, raw);
    localStorage.setItem(key, raw);
  }catch{}
}
async function readJsonResponse(r){
  const text = await r.text();
  if(!text) return {};
  try { return JSON.parse(text); }
  catch {
    const clean = text.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    throw new Error(clean ? `HTTP ${r.status}: ${clean.slice(0,220)}` : `HTTP ${r.status}: Invalid JSON response`);
  }
}
function lang(){return window.OmniI18n?OmniI18n.currentLang('en'):'en'}
function tr(s){return window.OmniI18n?OmniI18n.t(s,lang()):s}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function safeId(s){return String(s||'node').toLowerCase().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'') || 'node'}
function cssEscapeValue(v){return window.CSS?.escape ? CSS.escape(String(v ?? '')) : String(v ?? '').replace(/["\\]/g,'\\$&')}
function clamp(n, min, max){return Math.max(min, Math.min(max, n))}
function normalizeTopologySpacing(raw){
  const src = raw && typeof raw === 'object' ? raw : {};
  return { proxmoxVmGap: clamp(Math.round(Number(src.proxmoxVmGap || src.proxmoxGuestGap || 150)), 110, 260) };
}
function proxmoxVmGap(){return normalizeTopologySpacing(topologySpacing).proxmoxVmGap}
function syncTopologySpacingUi(){

      data.topologySpacing = topologySpacing;

      data.topologyView = topoView.userMoved ? { scale: topoView.scale, x: topoView.x, y: topoView.y } : data.topologyView;
    }
    renderTopology(data);
    writeTopologyCache(data);

      topoView.userMoved = true;
      hideEdgeDeleteButtons();
      e.preventDefault();
      e.stopPropagation();
      try { nodeEl.setPointerCapture(e.pointerId); } catch {}
      return;
    }
    if(e.button !== 0 || e.target.closest('.legend,.link-panel,.map-link-toggle,.topo-node')) return;
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    shell.classList.add('dragging');
    try { shell.setPointerCapture(e.pointerId); } catch {}
  });
  shell.addEventListener('pointermove', e => {
    if(linkDragging){
      updateTempLink(e);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(nodeDragging){
      const rawDx = (e.clientX - nodeDragging.startClientX) / topoView.scale;
      const rawDy = (e.clientY - nodeDragging.startClientY) / topoView.scale;
      const { dx, dy } = clampGroupDelta(nodeDragging.items || [], rawDx, rawDy);
      (nodeDragging.items || []).forEach(item => {
        const node = currentNodes.find(n => n.ref === item.ref);
        if(!node) return;
        node.x = item.startX + dx;
        node.y = item.startY + dy;
        if(item.el) {
          item.el.style.left = `${node.x}px`;
          item.el.style.top = `${node.y}px`;
        }
      });
      refreshTopologyEdges();
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    updateEdgeDeleteHover(e);
    if(!dragging) return;
    topoView.x += e.clientX - lastX;
    topoView.y += e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    topoView.userMoved = true;
    applyTopologyTransform();
  });
  function endDrag(e){
    if(linkDragging){
      const sourceRef = linkDragging.source.ref;
      const targetEl = document.elementFromPoint(e.clientX, e.clientY)?.closest?.('.topo-node');
      const targetRef = targetEl?.dataset.ref;
      removeTempLink();
      linkDragging = null;
      shell.classList.remove('linking');
      try { shell.releasePointerCapture(e.pointerId); } catch {}
      if(targetRef && targetRef !== sourceRef && !linkExists(sourceRef, targetRef)){
        saveTopologyLinks([...topologyLinks, { from: sourceRef, to: targetRef }])
          .catch(err => alert(err.message || 'Could not save topology link'));
      }
      return;
    }
    if(nodeDragging){
      (nodeDragging.items || []).forEach(item => {
        const node = currentNodes.find(n => n.ref === item.ref);
        if(node) topologyPositions[node.ref] = { x: node.x, y: node.y };
        item.el?.classList.remove('node-dragging');
      });
      if(lastData) lastData.topologyPositions = topologyPositions;
      saveTopologyPositions();
      shell.classList.remove('node-moving');
      try { nodeDragging.el.releasePointerCapture(e.pointerId); } catch {}
      nodeDragging = null;
      if(lastData) renderTopology(lastData);
      return;
    }
    if(!dragging) return;
    dragging = false;
    shell.classList.remove('dragging');
    saveTopologyView();
    try { shell.releasePointerCapture(e.pointerId); } catch {}
  }
  shell.addEventListener('pointerup', endDrag);
  shell.addEventListener('pointercancel', endDrag);
  shell.addEventListener('mouseleave', hideEdgeDeleteButtons);
  shell.addEventListener('dblclick', () => {
    topoView.userMoved = false;
    clearTopologyView();
    if(lastData) renderTopology(lastData);
  });
  document.getElementById('links-map-btn')?.addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    toggleLinkPanel();
  });
}
initTopologyControls();
window.addEventListener('resize',()=>{if(!topoView.userMoved) topoView.initialized = false; if(lastData) renderTopology(lastData)});
const cachedTopology = readTopologyCache();
if(cachedTopology) {
  renderTopology(cachedTopology);
  if(window.OmniI18n) OmniI18n.apply(document,lang());
}
load();
scheduleTopologyPoll(15000);
</script>
</body>
</html>
