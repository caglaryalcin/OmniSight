<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight — Status</title>
<link rel="icon" type="image/svg+xml" id="favicon" href="/assets/omnisight-logo.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#141617;--panel:#181A1B;--row:#1A202C;--border:#242C3B;
  --text:#E2E8F2;--muted:#7D8AA3;--green:#34D399;--red:#F87171;--yellow:#FBBF24;
}
body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:
  radial-gradient(900px 500px at 80% -10%, rgba(99,102,241,.13), transparent 60%),
  radial-gradient(800px 500px at 0% 110%, rgba(34,211,238,.07), transparent 60%)}
.wrap{max-width:760px;margin:0 auto;padding:48px 20px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo-dot{width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 12px rgba(52,211,153,.6)}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.overall{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:20px;font-size:16px;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.overall .dot{width:14px;height:14px;border-radius:50%}
.svc{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:border-color .15s;min-width:0}
.svc:hover{border-color:#2E3850}
.svc .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.svc .name{font-size:15px;font-weight:600;width:130px;flex-shrink:0}
.svc .chart{flex:1;min-width:90px;height:26px;background:rgba(0,0,0,0.15);border-radius:3px;overflow:hidden}
.svc .meta{font-size:13px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc .status-lbl{font-size:13px;font-weight:600;width:95px;text-align:right;flex-shrink:0}
.d-ok{background:var(--green)}.d-warn{background:var(--yellow)}.d-down{background:var(--red)}.d-gray{background:var(--muted)}
.t-ok{color:var(--green)}.t-warn{color:var(--yellow)}.t-down{color:var(--red)}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
.empty{text-align:center;color:var(--muted);padding:40px}
@media (max-width:680px){
  .wrap{padding:30px 14px}
  .svc{flex-wrap:wrap;gap:10px;padding:14px}
  .svc .name{width:auto;flex:1;min-width:150px}
  .svc .chart{order:3;flex-basis:100%}
  .svc .meta{order:4;flex-basis:100%}
  .svc .status-lbl{width:auto}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="logo-dot" id="overall-dot"></div><h1 id="title">OmniSight Status</h1></div>
  <div class="sub" id="updated"></div>
  <div class="overall" id="overall"><span class="dot d-gray"></span><span>Loading…</span></div>
  <div id="list"></div>
  <div class="foot">Auto-refreshes every 15s · Powered by <a href="https://github.com/caglaryalcin/OmniSight" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;font-weight:700">OmniSight</a></div>
</div>
<script>
function genChart(data, status) {
  const W = 300, H = 26;
  const clr = status === 'ok' ? '#34D399' : status === 'warn' ? '#FBBF24' : status === 'down' ? '#F87171' : '#7D8AA3';
  if (!data || data.length < 2) return '';
  const vals = data.map(d => Math.min(100, Math.max(0, Number(d.health) || 0)));
  const n = vals.length;
  const xStep = W / (n - 1);
  const pts = vals.map((v, i) => [i * xStep, H - (v / 100) * H]);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(2)},${p[1].toFixed(2)}`).join('');
  const area = `${line}L${W.toFixed(2)},${H}L0,${H}Z`;
  const gid = 'hg-' + Math.random().toString(36).slice(2, 7);
  let gridPath = '';
  for (let i = 1; i < 3; i++) gridPath += `M0,${i * 8.66} L${W},${i * 8.66} `;
  for (let i = 1; i < 10; i++) gridPath += `M${i * 30},0 L${i * 30},${H} `;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block;">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${clr}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${clr}" stop-opacity="0.0"/>
      </linearGradient>
    </defs>
    <path d="${gridPath}" stroke="var(--border)" stroke-width="1" opacity="0.4" vector-effect="non-scaling-stroke" />
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}
const dotCls = s => s === 'ok' ? 'd-ok' : s === 'warn' ? 'd-warn' : s === 'down' ? 'd-down' : 'd-gray';
const txtCls = s => s === 'ok' ? 't-ok' : s === 'warn' ? 't-warn' : s === 'down' ? 't-down' : '';
const label  = s => s === 'ok' ? 'Operational' : s === 'warn' ? 'Degraded' : s === 'down' ? 'Down' : s === 'connecting' ? 'Connecting…' : 'Unknown';
let faviconTimer = null;
function setFavicon(status) {
  const favicon = document.getElementById('favicon');
  if (!favicon) return;
  clearInterval(faviconTimer);
  const color = status === 'down' ? '#F87171' : status === 'warn' ? '#FBBF24' : status === 'ok' ? '#34D399' : '#7D8AA3';
  const make = (c, opacity = 1) => `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M3 16c3.5-5.8 7.8-8.7 13-8.7S25.5 10.2 29 16c-3.5 5.8-7.8 8.7-13 8.7S6.5 21.8 3 16Z' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round' opacity='${opacity}'/><circle cx='16' cy='16' r='4.5' fill='${encodeURIComponent(c)}' opacity='${opacity}'/><circle cx='16' cy='16' r='1.8' fill='%230B0E14' opacity='${opacity}'/></svg>`;
  favicon.href = make(color);
  if (status !== 'down') return;
  let visible = true;
  faviconTimer = setInterval(() => {
    visible = !visible;
    favicon.href = make(color, visible ? 1 : 0.15);
  }, 800);
}

async function load() {
  try {
    const r = await fetch('/api/public/status');
    if (!r.ok) throw new Error('Status page is not enabled');
    const d = await r.json();
    document.getElementById('title').textContent = d.title || 'OmniSight Status';
    document.title = (d.title || 'OmniSight') + ' — Status';
    document.getElementById('updated').textContent = 'Last updated ' + new Date(d.timestamp).toLocaleString();
    const svcs = d.services || [];
    const real = svcs.filter(s => s.status !== 'connecting');
    const worst = svcs.some(s => s.status === 'down') ? 'down' : svcs.some(s => s.status === 'warn') ? 'warn' : real.length ? 'ok' : svcs.length ? 'connecting' : 'gray';
    setFavicon(worst);
    document.getElementById('overall-dot').style.background =
      worst === 'ok' ? 'var(--green)' : worst === 'warn' ? 'var(--yellow)' : worst === 'down' ? 'var(--red)' : 'var(--muted)';
    document.getElementById('overall').innerHTML =
      '<span class="dot ' + dotCls(worst) + '"></span><span class="' + txtCls(worst) + '">' +
      (worst === 'ok' ? 'All systems operational' : worst === 'warn' ? 'Partial degradation' : worst === 'down' ? 'Major outage' : worst === 'connecting' ? 'Connecting…' : 'No data') + '</span>';
    document.getElementById('list').innerHTML = svcs.length ? svcs.map(s =>
      '<div class="svc"><span class="dot ' + dotCls(s.status) + '"></span>' +
      '<span class="name">' + s.title + '</span>' +
      '<div class="chart">' + genChart(s.history, s.status) + '</div>' +
      '<span class="meta">' + s.meta + '</span>' +
      '<span class="status-lbl ' + txtCls(s.status) + '">' + label(s.status) + '</span></div>'
    ).join('') : '<div class="empty">No services configured</div>';
    _fast = !!d.refreshing || svcs.some(s => s.status === 'connecting');
  } catch (e) {
    setFavicon('gray');
    document.getElementById('overall').innerHTML = '<span class="dot d-gray"></span><span>' + e.message + '</span>';
    document.getElementById('list').innerHTML = '';
    _fast = false;
  }
  setTimeout(load, _fast ? 2500 : 15000);
}
let _fast = false;
load();
</script>
</body>
</html>
