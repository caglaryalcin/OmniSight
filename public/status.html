<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight — Status</title>
<link rel="icon" type="image/svg+xml" id="favicon" href="/assets/omnisight-logo.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#141617;--panel:#181A1B;--row:#1A202C;--border:#242C3B;
  --text:#E2E8F2;--muted:#7D8AA3;--green:#34D399;--red:#F87171;--yellow:#FBBF24;
}
body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:
  radial-gradient(900px 500px at 80% -10%, rgba(99,102,241,.13), transparent 60%),
  radial-gradient(800px 500px at 0% 110%, rgba(34,211,238,.07), transparent 60%)}
.wrap{max-width:760px;margin:0 auto;padding:48px 20px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo-dot{width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 12px rgba(52,211,153,.6)}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.maintenance-banner{display:none;overflow:hidden;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.34);border-radius:16px;padding:16px 18px;margin:0 0 18px;box-shadow:0 16px 44px rgba(0,0,0,.18)}
.maintenance-banner.show{display:flex;align-items:center;gap:14px}
.maintenance-icon{width:38px;height:38px;border-radius:12px;background:rgba(251,191,36,.14);border:1px solid rgba(251,191,36,.28);display:flex;align-items:center;justify-content:center;color:var(--yellow);flex-shrink:0}
.maintenance-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
.maintenance-copy{font-size:13px;color:var(--muted);line-height:1.38;margin-top:3px}
.maintenance-window{margin-left:auto;font-size:12px;font-weight:700;color:var(--yellow);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.24);border-radius:999px;padding:6px 10px;white-space:nowrap}
.overall{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:20px;font-size:16px;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.overall .dot{width:14px;height:14px;border-radius:50%}
.svc{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:border-color .15s;min-width:0}
.svc:hover{border-color:#2E3850}
.svc .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.svc .name{font-size:15px;font-weight:600;width:130px;flex-shrink:0}
.svc .chart{position:relative;flex:1;min-width:90px;height:26px;background:rgba(0,0,0,0.15);border-radius:3px;overflow:hidden;cursor:default}
.svc .chart svg{border-radius:3px;overflow:hidden}
.svc.no-chart .name{flex:1;width:auto}
.svc.no-chart .meta{flex:1;text-align:right}
#os-tooltip{position:fixed;background:var(--panel);border:1px solid #2E3850;padding:8px 12px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .1s;z-index:9999;box-shadow:0 14px 34px rgba(0,0,0,.28);font-size:13px;color:var(--text);min-width:130px}
#os-hover-dot{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;opacity:0;z-index:9998;transform:translate(-50%,-50%);box-shadow:0 0 0 3px rgba(15,16,16,.9);transition:opacity .08s}
.tt-time{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;border-bottom:1px solid var(--border);padding-bottom:4px}
.tt-val{font-weight:700;font-variant-numeric:tabular-nums}
.svc .meta{font-size:13px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc .meta.multi{display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;white-space:normal;line-height:1.38;padding-block:1px}
.svc .meta.multi .meta-part{line-height:1.38}
.svc .meta-part{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc .status-lbl{font-size:13px;font-weight:600;width:95px;text-align:right;flex-shrink:0}
.d-ok{background:var(--green)}.d-warn{background:var(--yellow)}.d-down{background:var(--red)}.d-gray{background:var(--muted)}
.t-ok{color:var(--green)}.t-warn{color:var(--yellow)}.t-down{color:var(--red)}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
.empty{text-align:center;color:var(--muted);padding:40px}
@media (max-width:680px){
  .wrap{padding:30px 14px}
  .svc{flex-wrap:wrap;gap:10px;padding:14px}
  .svc .name{width:auto;flex:1;min-width:150px}
  .svc .chart{order:3;flex-basis:100%}
  .svc .meta{order:4;flex-basis:100%}
  .svc .status-lbl{width:auto}
  .maintenance-banner.show{align-items:flex-start;flex-wrap:wrap}
  .maintenance-window{margin-left:52px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="logo-dot" id="overall-dot"></div><h1 id="title">OmniSight Status</h1></div>
  <div class="sub" id="updated"></div>
  <div class="maintenance-banner" id="maintenance-banner"></div>
  <div class="overall" id="overall"><span class="dot d-gray"></span><span>Loading…</span></div>
  <div id="list"></div>
  <div class="foot">Auto-refreshes every 15s · Powered by <a href="https://github.com/caglaryalcin/OmniSight" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;font-weight:700">OmniSight</a></div>
</div>
<div id="os-tooltip"></div>
<div id="os-hover-dot"></div>
<script src="/i18n.js"></script>
<script>
let chartSeq = 0;
let chartPoints = {};
const POINT_INTERVAL_MS = 15000;
const i18n = window.OmniI18n || {
  currentLang: fallback => fallback || 'en',
  t: text => text,
};
function pointMs(d, i, n) {
  const raw = d?.time ?? d?.t ?? d?.timestamp;
  const parsed = typeof raw === 'string' ? Date.parse(raw) : Number(raw);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : Date.now() - (n - 1 - i) * POINT_INTERVAL_MS;
}
function genChart(data, status) {
  const W = 300, H = 26;
  const PAD = 3;
  const clr = status === 'ok' ? '#34D399' : status === 'warn' ? '#FBBF24' : status === 'down' ? '#F87171' : '#7D8AA3';
  if (!Array.isArray(data) || data.length < 2) return '';
  const rows = data;
  const vals = rows.map(d => Math.min(100, Math.max(0, Number(d.health) || 0)));
  const n = vals.length;
  const xStep = W / (n - 1);
  const innerH = H - PAD * 2;
  const pts = vals.map((v, i) => [i * xStep, PAD + (1 - v / 100) * innerH]);
  const chartId = 'status-chart-' + (++chartSeq);
  chartPoints[chartId] = vals.map((health, i) => ({
    health,
    time: pointMs(rows[i], i, n),
    xPct: n > 1 ? i / (n - 1) : 0,
    yPct: (PAD + (1 - health / 100) * innerH) / H,
  }));
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(2)},${p[1].toFixed(2)}`).join('');
  const area = `${line}L${W.toFixed(2)},${H}L0,${H}Z`;
  const gid = 'hg-' + Math.random().toString(36).slice(2, 7);
  let gridPath = '';
  for (let i = 1; i < 3; i++) gridPath += `M0,${i * 8.66} L${W},${i * 8.66} `;
  for (let i = 1; i < 10; i++) gridPath += `M${i * 30},0 L${i * 30},${H} `;
  return `<svg data-chart-id="${chartId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block;">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${clr}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${clr}" stop-opacity="0.0"/>
      </linearGradient>
    </defs>
    <path d="${gridPath}" stroke="var(--border)" stroke-width="1" opacity="0.4" vector-effect="non-scaling-stroke" />
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}
const dotCls = s => s === 'ok' ? 'd-ok' : s === 'warn' ? 'd-warn' : s === 'down' ? 'd-down' : 'd-gray';
const txtCls = s => s === 'ok' ? 't-ok' : s === 'warn' ? 't-warn' : s === 'down' ? 't-down' : '';
let pageLang = 'en';
try { pageLang = i18n.currentLang('en'); } catch {}
function t(text) {
  return i18n.t(text, pageLang);
}
const label  = s => s === 'ok' ? t('Operational') : s === 'warn' ? t('Degraded') : s === 'down' ? t('Down') : s === 'connecting' ? t('Connecting…') : t('Unknown');
function escHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function metaHtml(meta) {
  const parts = String(meta || '').split(/\s*(?:[·•]|\r?\n)\s*/g).filter(Boolean);
  if (parts.length <= 1) return { cls: '', html: escHtml(meta || '') };
  return { cls: ' multi', html: parts.map(p => '<span class="meta-part">' + escHtml(p) + '</span>').join('') };
}
function serviceTitle(service) {
  return String(service?.title || service?.id || '');
}
function maintenanceHtml(info) {
  if (!info?.active) return '';
  const start = info.start || '';
  const end = info.end || '';
  const windowText = start || end ? [start, end].filter(Boolean).join(' - ') : '';
  return `<div class="maintenance-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v5l3 2"/><circle cx="12" cy="12" r="9"/></svg>
    </div>
    <div style="min-width:0;flex:1">
      <div class="maintenance-title">${escHtml(t('Maintenance mode'))}</div>
      <div class="maintenance-copy">${escHtml(t('Planned maintenance is active. Alerts are muted while the maintenance window is active.'))}</div>
    </div>
    ${windowText ? `<div class="maintenance-window">${escHtml(t('Window'))}: ${escHtml(windowText)}</div>` : ''}`;
}
function chartHealthLabel(v) {
  return v <= 0 ? t('Down') : v < 100 ? t('Degraded') : t('Operational');
}
function moveChartHover(e) {
  const chart = e.target.closest?.('.chart');
  if (!chart) {
    const tt = document.getElementById('os-tooltip');
    const hDot = document.getElementById('os-hover-dot');
    if (tt) tt.style.opacity = '0';
    if (hDot) hDot.style.opacity = '0';
    return;
  }
  const tt = document.getElementById('os-tooltip');
  const hDot = document.getElementById('os-hover-dot');
  if (!tt) return;
  const svg = chart.querySelector('svg[data-chart-id]');
  const id = svg?.dataset.chartId;
  const points = id ? chartPoints[id] : null;
  if (!points?.length) return;
  const rect = chart.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const idx = Math.max(0, Math.min(points.length - 1, Math.round(pct * (points.length - 1))));
  const p = points[idx];
  const dotX = rect.left + p.xPct * rect.width;
  const dotY = rect.top + p.yPct * rect.height;
  const color = p.health <= 0 ? 'var(--red)' : p.health < 100 ? 'var(--yellow)' : 'var(--green)';
  if (hDot) {
    hDot.style.left = dotX + 'px';
    hDot.style.top = dotY + 'px';
    hDot.style.background = color;
    hDot.style.opacity = '1';
  }
  const d = new Date(p.time);
  const dStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  const tStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  tt.innerHTML = `<div class="tt-time">${dStr}, ${tStr}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div style="display:flex;align-items:center;gap:6px">
        <div style="width:10px;height:10px;border-radius:2px;background:${color}"></div>
        <span>Status</span>
      </div>
      <span class="tt-val" style="color:${color}">${chartHealthLabel(p.health)} · ${Math.round(p.health)}%</span>
    </div>`;
  let tx = e.clientX + 15;
  let ty = e.clientY + 15;
  if (tx + 180 > window.innerWidth) tx = e.clientX - 180;
  if (ty + 80 > window.innerHeight) ty = e.clientY - 80;
  tt.style.left = tx + 'px';
  tt.style.top = ty + 'px';
  tt.style.opacity = '1';
}
function clearChartHover(e) {
  const chart = e.target.closest?.('.chart');
  if (!chart) return;
  const tt = document.getElementById('os-tooltip');
  const hDot = document.getElementById('os-hover-dot');
  if (tt) tt.style.opacity = '0';
  if (hDot) hDot.style.opacity = '0';
}
document.addEventListener('mousemove', moveChartHover);
document.addEventListener('mouseleave', clearChartHover, true);
let faviconTimer = null;
function setFavicon(status) {
  const favicon = document.getElementById('favicon');
  if (!favicon) return;
  clearInterval(faviconTimer);
  const color = status === 'down' ? '#F87171' : status === 'warn' ? '#FBBF24' : status === 'ok' ? '#34D399' : '#7D8AA3';
  const make = (c, opacity = 1) => `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M3 16c3.5-5.8 7.8-8.7 13-8.7S25.5 10.2 29 16c-3.5 5.8-7.8 8.7-13 8.7S6.5 21.8 3 16Z' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round' opacity='${opacity}'/><circle cx='16' cy='16' r='4.5' fill='${encodeURIComponent(c)}' opacity='${opacity}'/><circle cx='16' cy='16' r='1.8' fill='%230B0E14' opacity='${opacity}'/></svg>`;
  favicon.href = make(color);
  if (status !== 'down') return;
  let visible = true;
  faviconTimer = setInterval(() => {
    visible = !visible;
    favicon.href = make(color, visible ? 1 : 0.15);
  }, 800);
}

async function load() {
  try {
    const r = await fetch('/api/public/status');
    if (!r.ok) throw new Error(t('Status page is not enabled'));
    const d = await r.json();
    try { pageLang = i18n.currentLang(d.preferredLanguage || 'en'); } catch { pageLang = d.preferredLanguage || 'en'; }
    document.documentElement.lang = pageLang;
    const footerVersion = d.version ? ' · v' + escHtml(d.version) : '';
    document.querySelector('.foot').innerHTML = pageLang === 'tr'
      ? 'Her 15 saniyede otomatik yenilenir · <a href="https://github.com/caglaryalcin/OmniSight" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;font-weight:700">OmniSight</a> ile çalışır' + footerVersion
      : 'Auto-refreshes every 15s · Powered by <a href="https://github.com/caglaryalcin/OmniSight" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;font-weight:700">OmniSight</a>' + footerVersion;
    document.getElementById('title').textContent = d.title || 'OmniSight Status';
    document.title = (d.title || 'OmniSight') + ' — ' + t('Status');
    document.getElementById('updated').textContent = [d.description || '', t('Last updated') + ' ' + new Date(d.timestamp).toLocaleString()].filter(Boolean).join(' · ');
    const maintenanceBanner = document.getElementById('maintenance-banner');
    if (maintenanceBanner) {
      maintenanceBanner.innerHTML = maintenanceHtml(d.maintenance);
      maintenanceBanner.classList.toggle('show', !!d.maintenance?.active);
    }
    const svcs = d.services || [];
    chartSeq = 0;
    chartPoints = {};
    const real = svcs.filter(s => s.status !== 'connecting');
    const worst = svcs.some(s => s.status === 'down') ? 'down' : svcs.some(s => s.status === 'warn') ? 'warn' : real.length ? 'ok' : svcs.length ? 'connecting' : 'gray';
    setFavicon(worst);
    document.getElementById('overall-dot').style.background =
      worst === 'ok' ? 'var(--green)' : worst === 'warn' ? 'var(--yellow)' : worst === 'down' ? 'var(--red)' : 'var(--muted)';
    document.getElementById('overall').innerHTML =
      '<span class="dot ' + dotCls(worst) + '"></span><span class="' + txtCls(worst) + '">' +
      (worst === 'ok' ? t('All systems operational') : worst === 'warn' ? t('Partial degradation') : worst === 'down' ? t('Major outage') : worst === 'connecting' ? t('Connecting…') : t('No data')) + '</span>';
    document.getElementById('list').innerHTML = svcs.length ? svcs.map(s => {
      const meta = metaHtml(s.meta);
      const history = Array.isArray(s.history) ? s.history : [];
      const chart = history.length >= 2 ? '<div class="chart">' + genChart(history, s.status) + '</div>' : '';
      return '<div class="svc' + (chart ? '' : ' no-chart') + '"><span class="dot ' + dotCls(s.status) + '"></span>' +
        '<span class="name">' + escHtml(serviceTitle(s)) + '</span>' +
        chart +
        '<span class="meta' + meta.cls + '">' + meta.html + '</span>' +
        '<span class="status-lbl ' + txtCls(s.status) + '">' + label(s.status) + '</span></div>';
    }).join('') : '<div class="empty">' + t('No services configured') + '</div>';
    _fast = !!d.refreshing || svcs.some(s => s.status === 'connecting');
  } catch (e) {
    setFavicon('gray');
    document.getElementById('maintenance-banner')?.classList.remove('show');
    document.getElementById('overall').innerHTML = '<span class="dot d-gray"></span><span>' + escHtml(e.message) + '</span>';
    document.getElementById('list').innerHTML = '';
    _fast = false;
  }
  setTimeout(load, _fast ? 2500 : 15000);
}
let _fast = false;
load();
</script>
</body>
</html>
