<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight — Status</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231E2021' stroke='%233dba7e' stroke-width='2'/><circle cx='16' cy='16' r='6' fill='%233dba7e'/><circle cx='16' cy='16' r='10' fill='none' stroke='%233dba7e' stroke-width='1.5' stroke-opacity='.4'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#181A1B;--panel:#1E2021;--row:#242627;--border:#2E3234;
  --text:#C9D1D9;--muted:#6E7681;--green:#3dba7e;--red:#e74c3c;--yellow:#f39c12;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:48px 20px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo-dot{width:14px;height:14px;border-radius:50%;background:var(--green)}
h1{font-size:22px;font-weight:700}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.overall{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:20px;font-size:16px;font-weight:600}
.overall .dot{width:14px;height:14px;border-radius:50%}
.svc{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px}
.svc .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.svc .name{font-size:15px;font-weight:600;flex:1}
.svc .meta{font-size:13px;color:var(--muted)}
.d-ok{background:var(--green)}.d-warn{background:var(--yellow)}.d-down{background:var(--red)}.d-gray{background:var(--muted)}
.t-ok{color:var(--green)}.t-warn{color:var(--yellow)}.t-down{color:var(--red)}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
.empty{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="logo-dot" id="overall-dot"></div><h1 id="title">OmniSight Status</h1></div>
  <div class="sub" id="updated"></div>
  <div class="overall" id="overall"><span class="dot d-gray"></span><span>Loading…</span></div>
  <div id="list"></div>
  <div class="foot">Auto-refreshes every 15s · Powered by OmniSight</div>
</div>
<script>
const dotCls = s => s === 'ok' ? 'd-ok' : s === 'warn' ? 'd-warn' : s === 'down' ? 'd-down' : 'd-gray';
const txtCls = s => s === 'ok' ? 't-ok' : s === 'warn' ? 't-warn' : 't-down';
const label  = s => s === 'ok' ? 'Operational' : s === 'warn' ? 'Degraded' : s === 'down' ? 'Down' : 'Unknown';

async function load() {
  try {
    const r = await fetch('/api/public/status');
    if (!r.ok) throw new Error('Status page is not enabled');
    const d = await r.json();
    document.getElementById('title').textContent = d.title || 'OmniSight Status';
    document.title = (d.title || 'OmniSight') + ' — Status';
    document.getElementById('updated').textContent = 'Last updated ' + new Date(d.timestamp).toLocaleString();
    const svcs = d.services || [];
    const worst = svcs.some(s => s.status === 'down') ? 'down' : svcs.some(s => s.status === 'warn') ? 'warn' : svcs.length ? 'ok' : 'gray';
    document.getElementById('overall-dot').style.background =
      worst === 'ok' ? 'var(--green)' : worst === 'warn' ? 'var(--yellow)' : worst === 'down' ? 'var(--red)' : 'var(--muted)';
    document.getElementById('overall').innerHTML =
      '<span class="dot ' + dotCls(worst) + '"></span><span class="' + txtCls(worst) + '">' +
      (worst === 'ok' ? 'All systems operational' : worst === 'warn' ? 'Partial degradation' : worst === 'down' ? 'Major outage' : 'No data') + '</span>';
    document.getElementById('list').innerHTML = svcs.length ? svcs.map(s =>
      '<div class="svc"><span class="dot ' + dotCls(s.status) + '"></span>' +
      '<span class="name">' + s.title + '</span>' +
      '<span class="meta">' + s.meta + '</span>' +
      '<span class="' + txtCls(s.status) + '" style="font-size:13px;font-weight:600">' + label(s.status) + '</span></div>'
    ).join('') : '<div class="empty">No services configured</div>';
  } catch (e) {
    document.getElementById('overall').innerHTML = '<span class="dot d-gray"></span><span>' + e.message + '</span>';
    document.getElementById('list').innerHTML = '';
  }
}
load();
setInterval(load, 15000);
</script>
</body>
</html>
