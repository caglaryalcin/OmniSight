<!DOCTYPE html>
<html lang="en">
<head>
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("os_theme")||"dark")}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniSight — Help</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%230B0E14' stroke='%2334D399' stroke-width='2'/><circle cx='16' cy='16' r='6' fill='%2334D399'/><circle cx='16' cy='16' r='10' fill='none' stroke='%2334D399' stroke-width='1.5' stroke-opacity='.4'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0E14;--panel:#12161F;--row:#1A202C;--border:#242C3B;--text:#E2E8F2;--muted:#7D8AA3;--green:#34D399;}
body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
header{background:var(--panel);border-bottom:1px solid var(--border);height:64px;padding:0 24px;display:flex;align-items:center}
.logo{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.ldot{width:12px;height:12px;border-radius:50%;background:var(--green)}
main{max-width:760px;margin:40px auto;padding:0 24px}
h1{font-size:22px;font-weight:700;margin-bottom:20px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;line-height:1.7}
a.gh{display:inline-flex;align-items:center;gap:10px;color:var(--green);text-decoration:none;font-size:15px;font-weight:600}
a.gh:hover{text-decoration:underline}
html.embed header{display:none}
html[data-theme="light"]{--bg:#f3f5f9;--panel:#ffffff;--row:#eef1f6;--border:#dde3ec;--text:#1c2433;--muted:#64748b;--green:#0e9f6e;--red:#dc2f2f;--yellow:#b7791f;--blue:#3b82f6;}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('embed');</script>
</head>
<body>
<header><a href="/" class="logo"><div class="ldot"></div>OmniSight</a></header>
<main>
  <h1>Help</h1>
  <div class="card">
    <p style="margin-bottom:14px">Documentation, source code and issues:</p>
    <a class="gh" href="https://github.com/caglaryalcin/OmniSight" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.7.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.7 18 5 18 5c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
      github.com/caglaryalcin/OmniSight
    </a>
  </div>
</main>
</body>
</html>
