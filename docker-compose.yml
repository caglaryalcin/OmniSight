services:
  omnisight:
    build: .
    # image: omnisight:latest
    container_name: omnisight
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Encryption is ON by default (auto-managed secret.key). Optional overrides:
      - OMNISIGHT_SECRET=${OMNISIGHT_SECRET:-}
      # - OMNISIGHT_ENCRYPT=false   # disable config encryption
    volumes:
      # single persistent dir — holds config.yaml, secret.key, auth.yaml, sessions.yaml,
      # kube.bin and any SSH keys. Docker auto-creates it; nothing to pre-create.
      - ./credentials:/app/credentials
