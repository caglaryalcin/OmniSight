services:
  omnisight:
    image: ghcr.io/caglaryalcin/omnisight:latest
    # For local development builds, use this instead of the published image:
    # build: .
    container_name: omnisight
    restart: unless-stopped
    ports:
      - "3000:3000"
    cap_add:
      - NET_RAW
    environment:
      - PORT=3000
      - TZ=${TZ:-UTC}
      # Encryption is ON by default (auto-managed secret.key). Optional overrides:
      - OMNISIGHT_SECRET=${OMNISIGHT_SECRET:-}
      # - OMNISIGHT_ENCRYPT=false   # disable config encryption
      # Custom CA: drop *.crt/*.pem into ./data/certs/ (auto-trusted), or point Node to a file:
      # - NODE_EXTRA_CA_CERTS=/app/data/certs/ca.crt
    volumes:
      # single persistent dir (data/) — holds config.yaml, secret.key, auth.yaml, sessions.yaml,
      # kube.bin, SSH keys, and certs/ (custom CA certificates). Docker auto-creates it.
      - ./data:/app/data
